<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Contact Us | Cascade Crusaders</title>
    <meta name="description"
      content="Get in touch with Cascade Crusaders. Want to book your next trip? Contact us !">
    <meta name="author" content="Kekeletso Nhlapo">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Rafting Company Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="company-info-section">
            <h1>Cascade Crusaders</h1>
            <div class="info-grid">
                <div class="address-card">
                    <p>📍531 Sias Oosthuizen Street</p>
                    <p>Clarens, Free State</p>
                    <p>📞Phone: (+27)71 758 1778</p>
                    <p>✉️Email: clarensxtreme.co.za
                    </p>
                </div>
                <div class="map-container">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3505.915422094607!2d28.42372017534247!3d-28.51219227573063!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e8d596e41b85bf5%3A0x55ac83f372c3e29f!2s531%20Sias%20Oosthuizen%20St%2C%20Clarens%2C%209707!5e0!3m2!1sen!2sza!4v1780934948899!5m2!1sen!2sza"
                      width="400" height="400" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>
        <section class="contact-form-section">
            <form action="#" method="post" class="contact-form">
                <div class="form-item">
                    <label for="username">Full Name:</label>
                    <input type="text" id="username" name="username" required>
                    <label for="useremail">Email Address:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
                <fieldset class="form-item">
                    <legend>Purpose of Message:</legend>
                    <label><input type="radio" id="purpose" name="purpose" value="general"
                          checked>General
                        Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose"
                          value="reservation">Reservation
                        Question</label>
                    <label><input type="radio" id="suggestion" name="purpose"
                          value="suggestion">Website
                        Suggestion</label>
                </fieldset>
                <div class="form-item">
                    <label for="usermessage">Your Message:</label>
                    <textarea id="usermessage" name="usermessage" rows="5" required></textarea>
                </div>
                <div class="checkbox-item">
                    <label><input type="checkbox" id="subscribe" name="subscribe" value="yes">Please
                        subscribe me
                        to the monthly newsletter</label>
                </div>
                <button type="submit" class="submit-btn">Submit Message</button>
            </form>
        </section>
        <section class="employee-section">
            <h2>We Are Here To Serve You</h2>
            <div class="employee-container">
                <figure>
                    <img src="images/doe.webp" alt="General Manager">
                    <figcaption><strong>John Doe</strong>- General Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/norajones.png" alt="Rafting Guide">
                    <figcaption><strong>Nora Jones</strong>- Lead Rafting Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/emilysmith.webp" alt="Office Worker">
                    <figcaption><strong>Emily Smith</strong>- Booking Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©️2026 🌊Cascade Crusaders. All rights reserved.🌊 Kekeletso Nhlapo</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/icons8-facebook-logo-80.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/icons8-linkedin-80.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/icons8-instagram-logo-80.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
